<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>ShadowName</h1>
      <div class="section">
        <label for="first-input">First Name</label>
        <input type="text" id="first-input" placeholder="e.g. John" />
      </div>
      <div class="section">
        <label for="last-input">Last Name</label>
        <input type="text" id="last-input" placeholder="e.g. Smith" />
        <button id="save-btn">Save</button>
      </div>
      <div class="section">
        <details class="advanced">
          <summary>Advanced</summary>
          <label for="pepper-input">Secret Key (pepper)</label>
          <div class="pepper-row">
            <input type="text" id="pepper-input" placeholder="Optional secret phrase" />
            <button class="gen-btn" id="gen-pepper-btn" title="Generate random key">&#x21bb;</button>
          </div>
        </details>
      </div>
      <div class="section" id="alias-section" style="display: none">
        <label>Current Domain Aliases</label>
        <div class="alias-row">
          <div class="alias-box" id="alias-first"></div>
          <button class="copy-btn" data-target="first" title="Copy first name alias">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
        </div>
        <div class="alias-row">
          <div class="alias-box" id="alias-last"></div>
          <button class="copy-btn" data-target="last" title="Copy last name alias">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
        </div>
        <div class="alias-row">
          <div class="alias-box alias-full" id="alias-full"></div>
          <button class="copy-btn" data-target="full" title="Copy full name alias">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
        </div>
        <div class="domain-label" id="domain-label"></div>
      </div>
      <div class="status" id="status"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
